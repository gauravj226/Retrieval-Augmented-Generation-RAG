version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: rag_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/8000'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-init.sh:/ollama-init.sh
    entrypoint: ["/bin/sh", "/ollama-init.sh"]
    ports:
      - "11434:11434"
    networks:
      - rag_network
    restart: unless-stopped
    # ── GPU support (NVIDIA) — uncomment to enable ──────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - sqlite_data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
    depends_on:
      chromadb:
        condition: service_healthy
    gpus: all
    networks:
      - rag_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "3000:80"
    volumes:
      # Windows: set SSL_DIR=C:/rag-platform/ssl in .env
      # Linux:   defaults to /etc/rag-platform/ssl
      - ${SSL_DIR:-/etc/rag-platform/ssl}:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - rag_network
    restart: unless-stopped

volumes:
  chroma_data:
  uploads_data:
  sqlite_data:
  ollama_data:

networks:
  rag_network:
    driver: bridge
