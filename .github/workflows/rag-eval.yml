name: Continuous RAG Evaluation

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/rag-eval.yml"
      - "eval/**"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/rag-eval.yml"
      - "eval/**"

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run continuous eval
        run: |
          python -m app.eval.continuous_eval --dataset ../eval/sample_eval.jsonl --min-retrieval 0.1 --min-grounding 0.1 --min-relevance 0.1
